<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hi Tech Academy - Admin Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        #loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            display: none;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(139,92,246,0.3);
            border-top: 3px solid #8b5cf6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .file-upload-area {
            transition: all 0.3s ease;
        }
        
        .file-upload-area:hover {
            border-color: #8b5cf6;
            background: rgba(139, 92, 246, 0.1);
        }
        
        .post-card {
            transition: all 0.3s ease;
        }
        
        .post-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body class="bg-gradient-to-br from-gray-900 via-purple-900 to-gray-900 text-white">
    <div id="loading">
        <div class="spinner"></div>
    </div>

    <!-- Sidebar -->
    <div class="flex h-screen">
        <div class="w-64 glass fixed h-full">
            <div class="p-6">
                <div class="flex items-center space-x-3 mb-8">
                    <div class="w-10 h-10 bg-gradient-to-r from-purple-600 to-pink-600 rounded-xl flex items-center justify-center">
                        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                        </svg>
                    </div>
                    <div class="text-xl font-bold">Admin Panel</div>
                </div>
                
                <div class="space-y-4">
                    <div class="p-3 bg-purple-600/20 rounded-lg border border-purple-600">
                        <div class="text-sm text-gray-400">Logged in as</div>
                        <div id="adminEmail" class="font-semibold truncate"></div>
                    </div>
                    
                    <button id="logoutBtn" class="w-full py-2 bg-red-600 rounded-lg hover:bg-red-700 transition">
                        Logout
                    </button>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="ml-64 flex-1 overflow-y-auto">
            <div class="container mx-auto px-8 py-8">
                <h1 class="text-4xl font-bold mb-2">Admin Dashboard</h1>
                <p class="text-gray-400 mb-8">Manage learning materials and resources for students</p>

                <!-- Create Post Section -->
                <div class="glass rounded-2xl p-8 mb-8">
                    <h2 class="text-2xl font-bold mb-6 flex items-center">
                        <svg class="w-6 h-6 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
                        </svg>
                        Share New Learning Material
                    </h2>
                    
                    <form id="createPostForm" class="space-y-6">
                        <div>
                            <label class="block text-sm font-medium mb-2">Title</label>
                            <input type="text" id="postTitle" required placeholder="e.g., Introduction to Python Programming"
                                class="w-full px-4 py-3 bg-gray-800 border border-gray-700 rounded-xl focus:outline-none focus:border-purple-500 transition">
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium mb-2">Description</label>
                            <textarea id="postDescription" rows="3" placeholder="Describe what students will learn..."
                                class="w-full px-4 py-3 bg-gray-800 border border-gray-700 rounded-xl focus:outline-none focus:border-purple-500 transition"></textarea>
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium mb-2">Material Type</label>
                            <select id="postAudience" 
                                class="w-full px-4 py-3 bg-gray-800 border border-gray-700 rounded-xl focus:outline-none focus:border-purple-500">
                                <option value="all">📚 General Learning Material</option>
                                <option value="student">🎓 Student Exclusive</option>
                            </select>
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium mb-2">Upload File (PDF, Video, Image)</label>
                            <div class="file-upload-area glass border-2 border-dashed border-gray-600 rounded-xl p-8 text-center cursor-pointer">
                                <input type="file" id="postFile" accept="image/*,video/*,.pdf" class="hidden">
                                <div id="fileInfo" class="text-gray-400">
                                    <svg class="w-12 h-12 mx-auto mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
                                    </svg>
                                    Click to upload or drag and drop
                                </div>
                            </div>
                        </div>
                        
                        <button type="submit" 
                            class="w-full py-3 bg-gradient-to-r from-purple-600 to-pink-600 rounded-xl font-semibold hover:opacity-90 transition transform hover:scale-[1.02]">
                            Publish Material
                        </button>
                    </form>
                </div>

                <!-- Posts Section -->
                <div class="glass rounded-2xl p-8">
                    <h2 class="text-2xl font-bold mb-6">📖 Learning Materials</h2>
                    <div id="postsContainer" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
                        <!-- Posts will be loaded here -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="./js/supabase.js"></script>
    <script src="./js/dashboard.js"></script>
</body>
</html>
