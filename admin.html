<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hi Tech Academy - Admin Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            transition: all 0.3s ease;
        }
        
        .glass-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.12);
        }
        
        #loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            display: none;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(139,92,246,0.3);
            border-top: 3px solid #8b5cf6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .gradient-text {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .file-upload-area {
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .file-upload-area:hover {
            border-color: #8b5cf6;
            background: rgba(139, 92, 246, 0.1);
            transform: scale(1.02);
        }
        
        .post-card {
            transition: all 0.3s ease;
        }
        
        .post-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        
        .animate-slide-in {
            animation: slideIn 0.5s ease-out;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-gray-900 via-purple-900 to-gray-900 text-white">
    <div id="loading">
        <div class="spinner"></div>
    </div>

    <!-- Sidebar -->
    <div class="flex h-screen">
        <div class="w-72 glass fixed h-full animate-slide-in">
            <div class="p-6">
                <div class="flex items-center space-x-3 mb-8">
                    <div class="w-12 h-12 bg-gradient-to-r from-purple-600 to-pink-600 rounded-2xl flex items-center justify-center shadow-lg">
                        <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                        </svg>
                    </div>
                    <div class="text-xl font-bold gradient-text">Admin Panel</div>
                </div>
                
                <div class="space-y-6">
                    <div class="glass-card rounded-xl p-4">
                        <div class="text-sm text-gray-400 mb-1">Logged in as</div>
                        <div id="adminEmail" class="font-semibold text-purple-300 truncate"></div>
                    </div>
                    
                    <div class="glass-card rounded-xl p-4">
                        <div class="text-sm text-gray-400 mb-2">Quick Stats</div>
                        <div class="space-y-2">
                            <div class="flex justify-between">
                                <span class="text-sm">Total Materials</span>
                                <span id="totalMaterials" class="font-bold text-purple-400">0</span>
                            </div>
                            <div class="flex justify-between">
                                <span class="text-sm">Students</span>
                                <span id="totalStudents" class="font-bold text-purple-400">0</span>
                            </div>
                        </div>
                    </div>
                    
                    <button id="logoutBtn" class="w-full py-2.5 bg-red-600/80 hover:bg-red-600 rounded-xl transition transform hover:scale-105 font-semibold">
                        Logout
                    </button>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="ml-72 flex-1 overflow-y-auto">
            <div class="container mx-auto px-8 py-8">
                <div class="mb-8">
                    <h1 class="text-4xl font-bold mb-2">Admin Dashboard</h1>
                    <p class="text-gray-400">Manage and publish learning materials for your students</p>
                </div>

                <!-- Create Post Section -->
                <div class="glass-card rounded-2xl p-8 mb-8">
                    <h2 class="text-2xl font-bold mb-6 flex items-center">
                        <svg class="w-6 h-6 mr-2 text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
                        </svg>
                        Share New Learning Material
                    </h2>
                    
                    <form id="createPostForm" class="space-y-6">
                        <div>
                            <label class="block text-sm font-medium mb-2">Title *</label>
                            <input type="text" id="postTitle" required placeholder="e.g., Introduction to Python Programming"
                                class="w-full px-4 py-3 bg-gray-800/50 border border-gray-700 rounded-xl focus:outline-none focus:border-purple-500 transition">
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium mb-2">Description</label>
                            <textarea id="postDescription" rows="3" placeholder="Describe what students will learn..."
                                class="w-full px-4 py-3 bg-gray-800/50 border border-gray-700 rounded-xl focus:outline-none focus:border-purple-500 transition"></textarea>
                        </div>
                        
                        <div class="grid md:grid-cols-2 gap-6">
                            <div>
                                <label class="block text-sm font-medium mb-2">Audience</label>
                                <select id="postAudience" 
                                    class="w-full px-4 py-3 bg-gray-800/50 border border-gray-700 rounded-xl focus:outline-none focus:border-purple-500">
                                    <option value="all">📚 General (All Students)</option>
                                    <option value="student">🎓 Student Exclusive</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-sm font-medium mb-2">Material Type</label>
                                <select id="postType" 
                                    class="w-full px-4 py-3 bg-gray-800/50 border border-gray-700 rounded-xl focus:outline-none focus:border-purple-500">
                                    <option value="file">📁 Document</option>
                                    <option value="video">🎥 Video</option>
                                    <option value="image">🖼️ Image</option>
                                    <option value="pdf">📄 PDF</option>
                                </select>
                            </div>
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium mb-2">Upload File *</label>
                            <div class="file-upload-area glass border-2 border-dashed border-gray-600 rounded-xl p-8 text-center transition">
                                <input type="file" id="postFile" accept="image/*,video/*,.pdf" class="hidden">
                                <div id="fileInfo">
                                    <svg class="w-12 h-12 mx-auto mb-3 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
                                    </svg>
                                    <p class="text-gray-400">Click to upload or drag and drop</p>
                                    <p class="text-xs text-gray-500 mt-2">Supports: Images, Videos, PDFs (Max 50MB)</p>
                                </div>
                            </div>
                        </div>
                        
                        <button type="submit" 
                            class="w-full py-3 bg-gradient-to-r from-purple-600 to-pink-600 rounded-xl font-semibold hover:opacity-90 transition transform hover:scale-[1.02] shadow-lg">
                            📤 Publish Material
                        </button>
                    </form>
                </div>

                <!-- Posts Section -->
                <div class="glass-card rounded-2xl p-8">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-2xl font-bold">📖 Published Materials</h2>
                        <button id="refreshBtn" class="px-4 py-2 bg-purple-600/50 rounded-lg hover:bg-purple-600 transition text-sm">
                            🔄 Refresh
                        </button>
                    </div>
                    <div id="postsContainer" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
                        <!-- Posts will be loaded here -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="./js/supabase.js"></script>
    <script src="./js/admin.js"></script>
</body>
</html>
